<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOA | Home</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f8ff; /* ლამაზი ღია ცისფერი ფონზე */
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        header {
            background-color: #1e90ff;
            color: white;
            padding: 20px 0;
            text-align: center;
        }

        nav {
            background-color: #4682b4;
            display: flex;
            justify-content: center;
            padding: 10px 0;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #ffd700; /* ყვითელი hover ეფექტი */
        }

        main {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        h1 {
            color: #1e90ff;
            text-align: center;
        }

        p {
            font-size: 18px;
            color: #333;
        }
    </style>
</head>
<body>

    <header>
        <h1>Welcome to GOA!</h1>
    </header>

    <nav>
        <a href="home.html">Home</a>
        <a href="aboutus.html">About Us</a>
        <a href="contact.html">Contact</a>
    </nav>

    <main>
        <p>
            ყველაზე კარგი აკადემია სადაც შეგიძლია ისწავლო პროგრამირება. ეს ყველაფერი ყოველდღე კაირია. ასევე არსებობს მინი-ლიდერები და რჩემის ლიდერები. ეს ყველას ძალიან უყვართ.
        </p>
    </main>

</body>
</html>
